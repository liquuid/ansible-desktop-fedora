---

- name: Google Chrome | Install lists packages
  dnf:
    name: https://dl.google.com/linux/direct/google-chrome-stable_current_x86_64.rpm
    state: installed
    disable_gpg_check: yes

- name: Add Brave repo
  become: yes
  yum_repository:
    name: Brave
    description: Brave YUM repo
    baseurl: https://brave-browser-rpm-release.s3.brave.com/x86_64/
    gpgkey: https://brave-browser-rpm-release.s3.brave.com/brave-core.asc

- name: Install Brave
  become: yes
  dnf:
    name: brave-browser
    state: latest

- name: Install Opera
  become: yes
  dnf:
    name: https://download3.operacdn.com/ftp/pub/opera/desktop/109.0.5097.68/linux/opera-stable_109.0.5097.68_amd64.rpm
    state: installed
    disable_gpg_check: yes

- name: Install Chromium
  become: yes
  dnf:
    name: chromium
    state: latest